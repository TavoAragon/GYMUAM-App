<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMUAM · Alumnos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">🏋️ GYMUAM</a>
        <a href="alumnos.html">Alumnos</a>
        <a href="activities.html">Actividades</a>
        <a href="inventory.html">Inventario</a>
        <a href="prestamos.html">Préstamos</a>
        <a href="registro.html">Asistencias</a>
    </nav>

<div class="container">
    <h1>Gestión de Alumnos</h1>

    <!-- Formulario -->
    <div class="form-container">
        <h2 id="formTitle">Registrar Nuevo Alumno</h2>
        <form id="alumnoForm">
            <input type="hidden" id="alumnoMatricula">
            <div class="form-group">
                <label for="matricula">Matrícula:</label>
                <input type="number" id="matricula" required>
            </div>
            <div class="form-group">
                <label for="nombreCompleto">Nombre Completo:</label>
                <input type="text" id="nombreCompleto" required>
            </div>
            <div class="form-group">
                <label for="carrera">Carrera:</label>
                <input type="text" id="carrera" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Guardar</button>
            <button type="button" id="cancelEdit" class="secondary hidden">Cancelar</button>
        </form>
    </div>

    <!-- Tabla -->
    <h2>Lista de Alumnos</h2>
    <table>
        <thead>
        <tr>
            <th>Matrícula</th>
            <th>Nombre</th>
            <th>Carrera</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="alumnosTable"></tbody>
    </table>
</div>

<script src="js/alumnos.js"></script>
</body>
</html>
